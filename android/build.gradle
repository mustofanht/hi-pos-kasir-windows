buildscript {
    ext.kotlin_version = '1.9.0'
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.3.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
// Inject a namespace for older plugins (e.g. thermal_printer 1.0.5) that only
// declare `package` in their AndroidManifest. AGP 8+ requires `namespace`.
// Must be registered before evaluationDependsOn(':app') forces evaluation.
subprojects {
    afterEvaluate { project ->
        if (project.hasProperty('android')) {
            android {
                if (namespace == null) {
                    namespace project.group.toString()
                }
            }
        }
    }
}

subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
